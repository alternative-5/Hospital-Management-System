<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard</title>
     {% load static %}
    <link rel="stylesheet" href="{% static 'pat/css/pat.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

</head>
<body>


    <div class="dashboard">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h2>Patient</h2><br>

                <hr>
            </div>

            <ul class="nav-links">
                <li>
                    <a href="{% url 'patients_d' %}">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>

                <li>

                    <a href="{% url 'p_a' %}">

                        <i class="fas fa-chart-line"></i>
                        <span>Appointments</span>
                    </a>
                </li>
                <li>
                    <a href="{% url 'logout1' %}">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </a>
                </li>
            </ul>
        </div>
    <div class="main-content">
            <header>
                <div class="header-container">

                  <div class="header-right">
                        <div class="profile">
                            <i class="fas fa-user-circle"></i>

                                <div class="profile-image">

                                    <img src="{{patient.profile.url}}" id="profileImage">


                                </div>

                        </div>



                        <div class="dropdown" style="background-color:none;">
                        <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" style="background-color:#0f61ef; color:#fff;">
                            {{patient.firstname}}
                        </button>
                                <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">

                                 <ul>

                                <li class="dropdown-item">Name : {{patient.firstname}} {{patient.lastname}} </li>

                                <li class="dropdown-item" >Email : {{patient.email}} </li>


                                 </ul>
                                {% if patient.id %}
                                  <a class="dropdown-item" href="{% url 'update_pat' patient.id %}">Edit</a>
                                {% else %}
                                  <span>No ID available</span>
                                {% endif %}
                                </div>
                        </div>




                  </div>
                </div>
                <hr>
            </header>

{% block content %}
{% endblock %}
       </div>
     </div>
   <script src="https://kit.fontawesome.com/a076d05399.js">

    </script>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
   </body>
</html>
