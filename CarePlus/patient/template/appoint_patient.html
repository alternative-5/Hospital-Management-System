{% extends 'patient_base.html' %}
{% load static %}
{% block content %}
    <form id="contact-form" action="/p_a/" method="POST">
        {% csrf_token %}
        <div class="row">
            <div class="col-lg-6 col-md-6">
                 <label>Patient Name :</label>
                <div class="form-box user-icon mb-30">

                    <input type="text" name="patient_name" placeholder="Name" value="{{patient.firstname}}">
                </div>
            </div>
            <br>
            <div class="col-lg-6 col-md-6">
                <label>Contact :</label>
                <div class="form-box email-icon mb-30">

                    <input type="number" name="contact" placeholder="Phone" pattern="[0-9]{10}" required>
                </div>
            </div>
            <br>
            <div class="col-lg-6 col-md-6 mb-30">
                <label>Doctor and Department :</label>
                <div class="select-itms">

                    <select name="doctor_department" id="select2">
                        <option value="">Doctor and Department</option>

                        {% for i in pt %}

                        <option value="{{i.firstname}} {{i.lastname}} {{i.department}}">{{i.firstname}} {{i.lastname}} - {{i.department}}</option>

                        {% endfor %}

                    </select>
                </div>
            </div>
            <div class="col-lg-6 col-md-6 mb-30">
                <label>Doctor</label>
                <div class="select-itms">

                    <select name="doctor" id="select3">
                        <option value="">Doctor</option>

                        {% for i in pt %}

                        <option value="{{i.firstname}}">{{i.firstname}}</option>

                        {% endfor %}

                    </select>
                </div>
            </div>
            <br>

             <div class="col-lg-6 col-md-6">
                <label>Date of Birth :</label>
                <div class="form-box subject-icon mb-30">
                    <input type="date" name="dob" placeholder="Date" required>
                </div>
            </div>
            <br>

             <div class="col-lg-6 col-md-6">
                <label>Address :</label>
                <div class="form-box subject-icon mb-30">
                    <input type="text" name="address" placeholder="Address" required>
                </div>
            </div>
            <br>
             <div class="col-lg-6 col-md-6">
                <label>Appointment Date :</label>
                <div class="form-box subject-icon mb-30">
                    <input type="date" name="appoint_date" placeholder="Appointment Date" required>
                </div>
            </div>
            <div class="col-lg-12">
                <label>Purpose :</label>
                <div class="form-box message-icon mb-65">

                    <textarea name="purpose" id="message" placeholder="Description" required></textarea>
                </div>
                <div class="submit-info">
                    <button class="btn" type="submit">Submit Now <i class="ti-arrow-right"></i> </button>
                </div>
            </div>

        </div>
    </form>
{% endblock %}
