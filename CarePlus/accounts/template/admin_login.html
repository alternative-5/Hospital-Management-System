{% extends 'base1.html' %}

{% block content %}
 <main>

    <div class="login-dark form-inline py-0 mx-4 my-4 pl-4 pr-4">
     <form method="post">
       {% csrf_token %}
      <h1 class="text-center">Login</h1>
     <hr>
      <div class="form-group"><input class="form-control mb-2" type="text" name="username" placeholder="Username"></div>
      <div class="form-group"><input class="form-control mb-2" type="password" name="password" placeholder="Password"></div>
         {% if error %}
         <p style="color:red;">{{ error }}</p>
         {% endif %}
      <div class="form-group"><button class="btn btn-primary btn-block mb-2 ml-2" type="submit" value="submit">Log In</button></div><br>

     </form>
    </div>

  </main>

{% endblock %}
