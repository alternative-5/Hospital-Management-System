{% extends 'base1.html' %}

{% block content %}
 <main>

    <div class="login-dark form-inline py-0 mx-4 my-4 pl-4 pr-4">
     <form method="post">
     {% csrf_token %}


      <h1 class="text-center">Patient Login</h1>
      <hr>
      <div class="form-group"><input class="form-control mb-2" type="text" name="username" placeholder="Username"></div>
      <div class="form-group"><input class="form-control mb-2" type="password" name="password" placeholder="Password"></div>
      {% if messages %}
       <span id="{{ message.tags }}">
         {% for message in messages %}
           <h6 class="{{ message.tags }}" style="color:red;">{{ message }}</h6>
         {% endfor %}
       </span>
      {% endif %}
      <div class="form-group"><button class="btn btn-primary btn-block mb-2 ml-2" type="submit">Log In</button></div><br>
      <a href="{% url 'patient_register' %}">Not Registered Yet? Register Now</a>
     </form>
    </div>

  </main>

{% endblock %}
