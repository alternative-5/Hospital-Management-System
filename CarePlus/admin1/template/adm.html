{% extends 'adm_base.html' %}
{% load static %}
{% block content %}

        <!-- Main Content -->
        <div class="main-content">
             <header>
                <div class="header-container">
                    <h1>Dashboard</h1>
                    <div class="header-right">
                        <div class="profile">
                            <i class="fas fa-user-circle"></i>
                            <span>Admin</span>
                        </div>
                    </div>
                </div>
                <hr>
            </header>
          <div class="content-container">

                <a href="{% url 'department1' %}" style="color:black; text-decoration:none;">

            <br>

                <a href="{% url 'emergency' %}" style="color:black; text-decoration:none;">

            </div>
            <br>

                <a href="{% url 'patient_list' %}" style="color:black; text-decoration:none;">
