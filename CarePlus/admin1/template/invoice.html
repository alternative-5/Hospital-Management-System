{% extends 'adm_base.html' %}
{% load static %}
{% block content %}
<div class="main-content">
<div class="container" style="padding:18px;">
       <center><h4> Patient Invoice Form</h4></center><hr> <br>
        <form method="post">
            {% csrf_token %}
            <div class="form-group flex-half">
                <label for="patient-name">Patient Name</label>
                <input type="text" id="patient-name" name="patient_name" placeholder="Enter patient name">
            </div>
            <div class="form-group flex-half">
                <label for="admission-date">Admission Date</label>
                <input type="date" id="admission-date" name="admission_date" required>
            </div>
            <div class="form-group flex-half">
                <label for="discharge-date">Discharge Date</label>
                <input type="datetime-local" id="discharge-date" name="discharge_date">
            </div>
            <div class="form-group flex-half">
                <label for="patient-id">Address</label>
                <input type="text" id="patient-id" name="patient_id" placeholder="Address">
            </div>
            <div class="form-group">
                <label for="treatment-details">Treatment Details</label>
                <textarea id="treatment-details" name="treatment_details" placeholder="Enter treatment details"></textarea>
            </div>
            <div class="form-group flex-half">
                <label for="doctor-name">Doctor Name</label>
                <input type="text" id="doctor-name" name="doctor_name" placeholder="Enter doctor name">
            </div>
            <div class="form-group flex-half">
                <label for="amount">Total Amount</label>
                <input type="number" id="amount" name="amount" step="0.01" placeholder="Enter total amount">
            </div>
            <div class="form-group">
                <button type="submit" class="submit-btn">Generate Invoice</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
